<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    background: #0f2027;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00ffd5;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: white;
}

.link {
    text-align: center;
    margin-top: 10px;
}

.link a {
    color: #00ffd5;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form action="/" method="POST">
        <input type="number" name="ac_no" placeholder="Account Number" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="/createAC">Create Account</a></p>
    </div>
</div>

</body>
</html>
